name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install HEIC decoder (libheif + libde265 decode plugin)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libheif-examples libheif-plugin-libde265
      - name: Optimize product photos (convert HEIC + shrink big phone uploads)
        run: node scripts/optimize-images.mjs
      - name: Build the checkout price list (store.json)
        run: node scripts/emit-store.mjs
      - name: Build static export
        # Served from the apex custom domain https://sherredsticks.com/ (root path),
        # so NEXT_PUBLIC_BASE_PATH is left empty. public/CNAME sets the custom domain.
        run: npm run build
        env:
          # The checkout backend (Cloudflare Worker) the basket posts to.
          NEXT_PUBLIC_CHECKOUT_URL: https://sherred-checkout.sherred-sons.workers.dev
          # The photo-upload backend the /upload page posts shrunk photos to.
          NEXT_PUBLIC_UPLOAD_URL: https://sherred-upload.sherred-sons.workers.dev
      - name: Disable Jekyll (so _next/ assets are served)
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://sherredsticks.com/
    steps:
      # GitHub Pages' backend intermittently returns "Deployment failed, try
      # again later" here even though the build succeeded — it clears on retry.
      # We attempt up to 3x; only a 3rd consecutive failure fails the run (so a
      # genuine break still notifies, but transient flakes self-heal silently).
      - name: Deploy to Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Deploy to Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Deploy to Pages (final attempt)
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
