# Checkout backend for the shop. Deploy with:  npx wrangler deploy
# Secrets:  npx wrangler secret put STRIPE_SECRET_KEY
#           npx wrangler secret put STRIPE_WEBHOOK_SECRET   (Pay It Forward tally)
name = "sherred-checkout"
# Steve's Cloudflare account (where this Worker already lives). Pinning it means a
# deploy only succeeds when logged into an account with access — never the wrong one.
account_id = "27c04775f8da13995086ac057a2b2319"
main = "src/index.js"
compatibility_date = "2025-06-01"
workers_dev = true

# Delivery is now zone-based: the Worker reads the rate table from the site's
# /shipping.json (source: src/data/shipping.json) and charges the buyer's
# destination zone. To change a postage price, edit src/data/shipping.json and
# push — no Worker redeploy needed. (The old flat SHIPPING_CENTS var is retired.)

# ── Pay It Forward tally ───────────────────────────────────────────────────────
[vars]
# The honest cost of making ONE gifted stick, in pence — this is the tally target.
# When contributions reach it, that's one stick funded and the bar rolls over to
# the next (the remainder carries). PLACEHOLDER: set to Steve's real materials +
# fair making cost before go-live (e.g. 4000 = £40). Editing this re-derives the
# tally live — no data migration.
UNIT_CENTS = "4000"

# The running tally lives in this KV namespace. Create it once (needs Cloudflare
# access to Steve's account) and paste the returned id below:
#   npx wrangler kv namespace create TALLY
# Until a real id is bound, /tally reads as £0 and the webhook simply no-ops.
[[kv_namespaces]]
binding = "TALLY"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
