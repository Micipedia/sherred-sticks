# Pages CMS (pagescms.org) config — the friendly editor for the shop owner.
# Connect this repo at app.pagescms.org; content saves commit to `main`, which
# the GitHub Pages workflow auto-deploys. Media/content paths below match the
# site's data layout (one JSON file per stick + photos under public/products).

media:
  - name: product-images
    label: Product photos
    input: public/products
    output: /products
    extensions: [jpg, jpeg, png, webp, avif, heic, heif, JPG, JPEG, PNG, WEBP, HEIC, HEIF]
    categories: [image]
  - name: accessory-images
    label: Accessory photos
    input: public/accessories
    output: /accessories
    extensions: [jpg, jpeg, png, webp, avif, heic, heif, JPG, JPEG, PNG, WEBP, HEIC, HEIF]
    categories: [image]

content:
  - name: products
    label: Walking sticks
    type: collection
    path: src/data/products
    format: json
    filename: '{fields.name}.json'
    view:
      fields: [name, category, sold, priceCents]
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: category
        label: Category
        type: select
        required: true
        options:
          values: [hiking, dinner, aid, robust]
      - name: detail
        label: Short detail line (under the name)
        type: string
      - name: priceCents
        label: Price in pence — e.g. 4500 for £45.00
        type: number
      - name: sold
        label: Sold
        type: boolean
        default: false
      - name: featured
        label: Show on homepage (featured)
        type: boolean
        default: false
      - name: shortDescription
        label: Card blurb (short)
        type: text
      - name: description
        label: Full description
        type: text
      - name: buyUrl
        label: Stripe buy link (paste the buy.stripe.com/... link)
        type: string
        pattern:
          regex: '^(https://buy\.stripe\.com/.+)?$'
          message: Must be a https://buy.stripe.com/... link (or left empty)
      - name: photos
        label: Photos (drag to reorder — the first is the main photo)
        type: image
        list: true
        options:
          media: product-images

  - name: accessories
    label: Accessories
    type: collection
    path: src/data/accessories
    format: json
    filename: '{fields.name}.json'
    view:
      fields: [name, priceCents, available]
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: priceCents
        label: Price in pence — e.g. 800 for £8.00
        type: number
      - name: available
        label: In stock
        type: boolean
        default: true
      - name: shortDescription
        label: Short description (shown on the card)
        type: text
      - name: description
        label: Full description
        type: text
      - name: photos
        label: Photos (first is the main)
        type: image
        list: true
        options:
          media: accessory-images

  - name: home
    label: Homepage wording
    type: file
    path: src/data/content/home.json
    format: json
    fields:
      - name: heroEyebrow
        label: Top line (small, above the big heading)
        type: string
      - name: heroHeading
        label: Big headline
        type: text
      - name: heroSubheading
        label: Intro sentence under the headline
        type: text
      - name: storyEyebrow
        label: 'Story section: small top line'
        type: string
      - name: storyHeading
        label: 'Story section: heading'
        type: text
      - name: storyBody
        label: 'Story section: paragraphs (one box per paragraph)'
        type: text
        list: true
      - name: ctaHeading
        label: 'Bottom banner: heading'
        type: text
      - name: ctaText
        label: 'Bottom banner: line underneath'
        type: text

  - name: about
    label: About page
    type: file
    path: src/data/content/about.json
    format: json
    fields:
      - name: intro
        label: Opening sentence (under the title)
        type: text
      - name: body
        label: Main paragraphs (one box per paragraph)
        type: text
        list: true
      - name: stepsHeading
        label: 'Making section: heading'
        type: string
      - name: steps
        label: How we make them (four steps)
        type: object
        list: true
        fields:
          - { name: title, label: Step title, type: string }
          - { name: text, label: Step text, type: text }
      - name: notice
        label: Notice box (leave empty to hide it)
        type: text

  - name: contact
    label: Contact page
    type: file
    path: src/data/content/contact.json
    format: json
    fields:
      - name: intro
        label: Opening sentence (under the title)
        type: text
      - name: deliveryHeading
        label: 'Delivery box: heading'
        type: string
      - name: deliveryText
        label: 'Delivery box: text'
        type: text
      - name: sizingHeading
        label: 'Sizing box: heading'
        type: string
      - name: sizingText
        label: 'Sizing box: text'
        type: text
      - name: footnote
        label: Small note at the bottom (leave empty to hide it)
        type: text
